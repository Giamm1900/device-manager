services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./backup-dm-dev.sql:/dump/backup-dm-dev.sql:ro
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/01-restore.sh:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d device-manager -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 60s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/Industrial-Telemetry-Dashboard
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
